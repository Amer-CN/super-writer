    required: false

  # ── 正文级块：fact 示例 ──
  - block_id: "section-07-facts-001"
    heading_path:
      - "第七节标题"
    role: "fact"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      items: []             # 每项含 key + value
    evidence_ids: []        # evidence_required: true 时必须有
    preserve_exactly: true
    formatter_candidates:
      - facts
    fallback:
      - ordered_list
    required: false

  # ── 正文级块：quote 示例 ──
  - block_id: "section-08-quote-001"
    heading_path:
      - "第八节标题"
