  # ── 正文级块：resource_list 示例 ──
  - block_id: "section-13-resources-001"
    heading_path:
      - "第十三节标题"
    role: "resource_list"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      links: []             # 每项含 name + url（≥2 项）
    evidence_ids: []
