  # ── 正文级块：article_signature 示例 ──
  - block_id: "signature-001"
    heading_path: []
    role: "article_signature"
    source_anchor:
      exact_text: ""
    payload: {}
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - footer-signature-brand
    fallback: []
    required: false

constraints:
  preserve_facts: []        # 必须逐字保留的事实
  preserve_stance: []       # 必须保留的立场
  preserve_quotes: []       # 必须保留的引用
  unresolved_facts: []      # 未决事实
  editor_anchors: []        # 编辑锚点
  forbidden_transformations: []  # 禁止的转换

component_policy:
  force_all_components: false           # 必须为 false
  formatter_has_final_choice: true      # formatter 拥有最终组件选择权
  allow_fallback: true                  # 允许降级
  max_primary_advanced_components: 6    # 主要高级组件上限
  prohibit_content_invention: true      # 禁止编造内容
  prohibit_duplicate_full_content: true # 禁止重复完整内容
