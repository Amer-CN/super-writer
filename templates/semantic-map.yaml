# Semantic Map Template
# Super Writer v0.3.0-rc1
# 本文件声明文章中每个语义块的 role、payload、source_anchor、formatter_candidates 和 fallback。
# article.md 保持干净可读；语义信息放到本文件。
# 使用 scripts/validate_semantic_map.py 校验。

schema_version: "1.0"

article:
  id: ""
  title: ""
  summary: ""
  article_type: ""          # 如：观点文/教程/深度分析/案例复盘/访谈...
  core_statement: ""
  target_platform:
    - wechat
  preferred_theme: null     # null=不指定主题；用户指定时填主题英文标识如 hammer

blocks:
  # ── 文章级块 ──
  - block_id: "cover-001"
    heading_path: []
    role: "article_cover"
    source_anchor:
      exact_text: ""        # 必须能在 article.md 中定位
    payload:
      title: ""
      summary_or_intro: ""
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - cover-breaking
    fallback:
      - paragraph
    required: true

  - block_id: "toc-001"
    heading_path: []
    role: "article_toc"
    source_anchor:
      exact_text: ""
    payload:
      toc_items: []         # ≤3 项
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - toc-scroll
    fallback: []
    required: false

  # ── 正文级块：key_statement 示例 ──
  - block_id: "intro-001"
    heading_path: []
    role: "key_statement"
    source_anchor:
      exact_text: ""        # 必须能在 article.md 中逐字定位
    payload:
      text: ""
    evidence_ids: []
    preserve_exactly: true
    formatter_candidates:
      - quote
      - quote-oneliner
    fallback:
      - paragraph
    required: true

  # ── 正文级块：comparison 示例 ──
  - block_id: "section-02-compare-001"
    heading_path:
      - "第二节标题"
    role: "comparison"
    source_anchor:
      exact_text: ""
    payload:
      subject_a: ""
      subject_b: ""
      dimensions: []        # 对比维度列表
      rows: []              # 每行含 dimension + value_a + value_b
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - compare
      - table-list-flow
    fallback:
      - paragraphs
      - ordered_list
    required: false

  # ── 正文级块：step_sequence 示例 ──
  - block_id: "section-03-steps-001"
    heading_path:
      - "第三节标题"
    role: "step_sequence"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      steps: []             # 有序步骤列表
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - steps
    fallback:
      - ordered_list
    required: false

  # ── 正文级块：timeline 示例 ──
  - block_id: "section-04-timeline-001"
    heading_path:
      - "第四节标题"
    role: "timeline"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      events: []            # 每项含 time + description
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - timeline
    fallback:
      - ordered_list
    required: false

  # ── 正文级块：faq 示例 ──
  - block_id: "section-05-faq-001"
    heading_path:
      - "第五节标题"
    role: "faq"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      items: []             # 每项含 question + answer
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - faq
    fallback:
      - subtitle
      - paragraph
    required: false

  # ── 正文级块：decision 示例 ──
  - block_id: "section-06-decision-001"
    heading_path:
      - "第六节标题"
    role: "decision"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      recommended: ""
      options: []           # 每项含 name + description
    evidence_ids: []
