  # ── 正文级块：case 示例 ──
  - block_id: "section-10-case-001"
    heading_path:
      - "第十节标题"
    role: "case"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      context: ""
      challenge: ""
      action: ""
      result: ""
    evidence_ids: []
    preserve_exactly: false
    formatter_candidates:
      - case
    fallback:
      - paragraphs
    required: false

  # ── 正文级块：dialogue 示例 ──
  - block_id: "section-11-dialogue-001"
    heading_path:
      - "第十一节标题"
    role: "dialogue"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
      messages: []          # 每项含 role + content
    evidence_ids: []
    preserve_exactly: true
    formatter_candidates:
      - dialogue
    fallback:
      - quote
      - paragraph
    required: false

  # ── 正文级块：code_comparison 示例 ──
  - block_id: "section-12-codecmp-001"
    heading_path:
      - "第十二节标题"
    role: "code_comparison"
    source_anchor:
      exact_text: ""
    payload:
      title: ""
